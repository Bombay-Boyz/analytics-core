name:        analytics-core
version:     1.0.0
synopsis:    Inference-Driven Analytics Platform — foundational runtime
license:     Apache-2.0

default-extensions:
  - GADTs
  - DataKinds
  - KindSignatures
  - TypeFamilies
  - StrictData
  - DerivingStrategies
  - GeneralizedNewtypeDeriving
  - OverloadedStrings
  - LambdaCase
  - TupleSections
  - ScopedTypeVariables
  - RankNTypes
  - NoImplicitPrelude
  - DeriveGeneric
  - StandaloneDeriving
  - FlexibleContexts
  - FlexibleInstances

ghc-options:
  - -Wall
  - -Wextra
  - -Werror
  - -Wincomplete-patterns
  - -Wincomplete-uni-patterns
  - -Wpartial-fields
  - -Wmissing-export-lists
  - -Wno-unused-do-bind

library:
  source-dirs: src
  exposed-modules:
    - Analytics.Core.Types
    - Analytics.Core.Fact
    - Analytics.Core.Rule
    - Analytics.Core.Evidence
    - Analytics.Core.Graph
    - Analytics.Core.Storage
    - Analytics.Core.KnowledgeBase
    - Analytics.Core.Inference
    - Analytics.Core.Query
    - Analytics.Core.Contradiction
    - Analytics.Core.Event.Types
    - Analytics.Core.Event.Event
    - Analytics.Core.Plugin
    - Analytics.Core.Runtime
  dependencies:
    - base >= 4.18 && < 5
    - relude >= 1.2
    - text >= 2.0
    - bytestring >= 0.11
    - uuid >= 1.3
    - containers >= 0.6
    - unordered-containers >= 0.2
    - time >= 1.12
    - mtl >= 2.3
    - stm >= 2.5
    - async >= 2.2
    - safe-exceptions >= 0.1
    - validation-selective >= 0.2

tests:
  analytics-core-test:
    main:        Main.hs
    source-dirs: test
    other-modules:
      - Analytics.Core.Test.Fact
      - Analytics.Core.Test.Rule
      - Analytics.Core.Test.Inference
      - Analytics.Core.Test.KnowledgeBase
      - Analytics.Core.Test.Graph
      - Analytics.Core.Test.Evidence
      - Analytics.Core.Test.Plugin
      - Analytics.Core.Test.Contradiction
      - Analytics.Core.Test.Determinism
    dependencies:
      - analytics-core
      - base
      - relude
      - tasty
      - tasty-quickcheck
      - tasty-hedgehog
      - tasty-hunit
      - QuickCheck
